</div>

<div class="mt-6 flex gap-4">
<button onclick="prev()" class="bg-gray-300 px-4 py-2 rounded-xl">← Geri</button>
<button onclick="next()" class="bg-green-400 text-white px-4 py-2 rounded-xl">İleri →</button>
</div>

</div>

<script>
const words = [
["achieve","başarmak","She worked hard to achieve her goals."],
["afford","karşılayabilmek","I can't afford a new phone."],
["avoid","kaçınmak","Avoid making mistakes."],
["benefit","fayda","Exercise has benefits."],
["challenge","zorluk","This is a challenge."],
["compare","karşılaştırmak","Compare two items."],
["complain","şikayet etmek","He complains a lot."],
["consider","düşünmek","Consider my idea."],
["decide","karar vermek","Decide quickly."],
["develop","geliştirmek","Develop skills."],
["discover","keşfetmek","Discover new things."],
["educate","eğitmek","Educate children."],
["encourage","teşvik etmek","Encourage others."],
["environment","çevre","Protect environment."],
["experience","deneyim","Gain experience."],
["explain","açıklamak","Explain clearly."],
["improve","geliştirmek","Improve yourself."],
["increase","artmak","Prices increase."],
["influence","etkilemek","Influence people."],
["knowledge","bilgi","Gain knowledge."],
["manage","yönetmek","Manage team."],
["mention","bahsetmek","Mention it."],
["opinion","görüş","Share opinion."],
["opportunity","fırsat","Good opportunity."],
["organize","düzenlemek","Organize work."],
["perform","sergilemek","Perform well."],
["prefer","tercih etmek","Prefer tea."],
["prepare","hazırlamak","Prepare food."],
["prevent","önlemek","Prevent problems."],
["provide","sağlamak","Provide help."],
["realize","fark etmek","Realize mistake."],
["reduce","azaltmak","Reduce waste."],
["require","gerektirmek","Require effort."],
["respect","saygı","Respect others."],
["responsible","sorumlu","Be responsible."],
["result","sonuç","Good result."],
["risk","risk","Take risk."],
["select","seçmek","Select item."],
["situation","durum","Hard situation."],
["solution","çözüm","Find solution."],
["suggest","önermek","Suggest idea."],
["support","desteklemek","Support team."],
["tend","eğilim","Tend to forget."],
["value","değer","Value time."],
["various","çeşitli","Various options."],
["waste","israf","Waste time."],
["focus","odaklanmak","Focus well."],
["balance","denge","Keep balance."],
["maintain","sürdürmek","Maintain health."],
["immediate","acil","Immediate action."]
];

let index = 0;
let flipped = false;

const wordEl = document.getElementById("word");
const exampleEl = document.getElementById("example");
const hintEl = document.getElementById("hint");

function updateCard(){
  const w = words[index];

  if(flipped){
    wordEl.innerText = w[1];
    exampleEl.innerText = w[2];
    hintEl.innerText = "Tekrar dokun → kelimeyi gör";
  } else {
    wordEl.innerText = w[0];
    exampleEl.innerText = "";
    hintEl.innerText = "Dokun → anlamı gör";
  }
}

document.getElementById("card").onclick = () => {
  flipped = !flipped;
  updateCard();
};

function next(){
  index = (index + 1) % words.length;
  flipped = false;
  updateCard();
}

function prev(){
  index = (index - 1 + words.length) % words.length;
  flipped = false;
  updateCard();
}

function speak(e){
  e.stopPropagation();
  const utterance = new SpeechSynthesisUtterance(words[index][0]);
  utterance.lang = "en-US";
  speechSynthesis.speak(utterance);
}

updateCard();

// dropdown
const btn = document.getElementById("practiceBtn");
const menu = document.getElementById("practiceMenu");
const arrow = document.getElementById("practiceArrow");

btn.addEventListener("click", () => {
  menu.classList.toggle("hidden");
  arrow.classList.toggle("rotate-180");
});
</script>
