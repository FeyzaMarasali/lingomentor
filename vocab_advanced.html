<script>
const words = [
["ubiquitous","her yerde bulunan","Smartphones are ubiquitous in modern life."],
["meticulous","çok titiz","She is meticulous about her work."],
["resilient","dayanıklı","Children are often very resilient."],
["cognitive","bilişsel","Cognitive skills improve with practice."],
["paradigm","paradigma","This is a new scientific paradigm."],
["contemplate","derin düşünmek","He began to contemplate his future."],
["hypothesis","hipotez","The hypothesis was proven correct."],
["viable","uygulanabilir","This is a viable solution."],
["obsolete","modası geçmiş","This technology is obsolete."],
["implication","çıkarım","The implication is serious."],
["notion","kavram","He rejected the notion completely."],
["threshold","eşik","We are at the threshold of change."],
["coherent","tutarlı","His argument is not coherent."],
["inherent","doğasında olan","Risk is inherent in business."],
["ambiguity","belirsizlik","There is ambiguity in the text."],
["deteriorate","bozulmak","The situation may deteriorate."],
["enhance","geliştirmek","This will enhance performance."],
["substantial","önemli, büyük","There is a substantial difference."],
["allocate","tahsis etmek","Resources are allocated fairly."],
["diminish","azalmak","His interest began to diminish."],
["comprehensive","kapsamlı","We need a comprehensive plan."],
["controversial","tartışmalı","This is a controversial topic."],
["feasible","gerçekleştirilebilir","The plan is feasible."],
["consequence","sonuç","Every action has consequences."],
["rigorous","titiz, sıkı","They followed a rigorous process."],
["sustainable","sürdürülebilir","We need sustainable energy."],
["sophisticated","sofistike","It is a sophisticated system."],
["intricate","karmaşık","The design is intricate."],
["assert","iddia etmek","He asserted his opinion strongly."],
["bias","önyargı","We must avoid bias."],
["derive","türemek","This word derives from Latin."],
["elaborate","detaylandırmak","Please elaborate your idea."],
["facilitate","kolaylaştırmak","This tool facilitates learning."],
["interpret","yorumlamak","How do you interpret this?"],
["legitimate","meşru","That is a legitimate concern."],
["manipulate","yönlendirmek","He tried to manipulate data."],
["overwhelm","bunaltmak","The workload overwhelmed him."],
["perceive","algılamak","People perceive things differently."],
["plausible","mantıklı","That explanation is plausible."],
["relevant","ilgili","This is relevant information."],
["scrutinize","detaylı incelemek","They scrutinized the report."],
["validate","doğrulamak","We need to validate the data."],
["coincide","çakışmak","The events coincide perfectly."],
["diverse","çeşitli","The class is diverse."],
["fundamental","temel","This is a fundamental principle."],
["impactful","etkili","It was an impactful speech."],
["noteworthy","dikkate değer","A noteworthy achievement."],
["persistent","ısrarcı","He is very persistent."],
["prevail","galip gelmek","Justice will prevail."],
["transition","geçiş","We are in transition period."]
];

let index = 0;
let flipped = false;

const wordEl = document.getElementById("word");
const exampleEl = document.getElementById("example");
const hintEl = document.getElementById("hint");

function updateCard(){
  const w = words[index];

  if(flipped){
    wordEl.innerText = w[1];
    exampleEl.innerText = w[2];
    hintEl.innerText = "Tekrar dokun → kelimeyi gör";
  } else {
    wordEl.innerText = w[0];
    exampleEl.innerText = "";
    hintEl.innerText = "Dokun → anlamı gör";
  }
}

document.getElementById("card").onclick = () => {
  flipped = !flipped;
  updateCard();
};

function next(){
  index = (index + 1) % words.length;
  flipped = false;
  updateCard();
}

function prev(){
  index = (index - 1 + words.length) % words.length;
  flipped = false;
  updateCard();
}

function speak(e){
  e.stopPropagation();
  const utterance = new SpeechSynthesisUtterance(words[index][0]);
  utterance.lang = "en-US";
  speechSynthesis.speak(utterance);
}

updateCard();

// dropdown
const btn = document.getElementById("practiceBtn");
const menu = document.getElementById("practiceMenu");
const arrow = document.getElementById("practiceArrow");

btn.addEventListener("click", () => {
  menu.classList.toggle("hidden");
  arrow.classList.toggle("rotate-180");
});
</script>
