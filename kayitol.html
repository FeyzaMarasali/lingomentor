<!DOCTYPE html>
<html class="light" lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>

<style>
  body { font-family: Lexend, sans-serif; }

  .chunky-button {
    transition: all 0.1s ease;
  }
  .chunky-button:active {
    transform: translateY(4px);
  }
</style>
</head>

<body class="bg-[#faf9f8] min-h-screen flex items-center justify-center p-6">

<main class="w-full max-w-[400px] flex flex-col gap-6">

<!-- HEADER -->
<div class="text-center">
  <h1 class="text-3xl font-bold text-[#58cc02]">LingoMentor</h1>
  <h2 class="text-xl font-bold mt-2">Yeni hesap oluştur</h2>
</div>

<!-- CARD -->
<div class="bg-white border-2 border-gray-200 rounded-xl p-6">

<form id="registerForm" class="flex flex-col gap-4">

  <!-- EMAIL -->
  <div>
    <label class="text-xs font-bold text-gray-500">E-POSTA</label>
    <input id="email" type="email"
      class="w-full h-[52px] px-3 rounded-xl border-2 border-gray-200 focus:border-[#2b6c00]"
      placeholder="E-posta gir" required>
  </div>

  <!-- PASSWORD -->
  <div>
    <label class="text-xs font-bold text-gray-500">ŞİFRE</label>
    <input id="password" type="password"
      class="w-full h-[52px] px-3 rounded-xl border-2 border-gray-200 focus:border-[#2b6c00]"
      placeholder="Şifre oluştur" required>
  </div>

  <!-- REGISTER BUTTON -->
  <button type="submit"
    class="chunky-button w-full h-[52px] bg-[#58cc02] text-white font-bold rounded-xl">
    Hesap Oluştur
  </button>

</form>

<!-- DIVIDER -->
<div class="flex items-center gap-2 my-4">
  <div class="flex-1 h-[2px] bg-gray-200"></div>
  <span class="text-xs text-gray-400 font-bold">VEYA</span>
  <div class="flex-1 h-[2px] bg-gray-200"></div>
</div>

<!-- GOOGLE BUTTON -->
<button id="googleBtn"
  type="button"
  class="chunky-button w-full h-[52px] border-2 border-gray-200 rounded-xl flex items-center justify-center gap-2">
  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
  GOOGLE İLE GİRİŞ
</button>

</div>

<!-- LOGIN LINK -->
<p class="text-center text-sm text-gray-500">
  Zaten hesabın var mı?
  <a href="girisyap.html" class="text-[#2b6c00] font-bold">Giriş yap</a>
</p>

</main>

<!-- ================= FIREBASE ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8yGwK8LwQsmDigg0H0dkLPnNYOFRWnKQ",
  authDomain: "lingomentor-84240.firebaseapp.com",
  projectId: "lingomentor-84240",
  storageBucket: "lingomentor-84240.firebasestorage.app",
  messagingSenderId: "1014296570803",
  appId: "1:1014296570803:web:ca192ee6dc8cca7df779c6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();


// ================= REGISTER =================
document.getElementById("registerForm").addEventListener("submit", (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Kayıt başarılı!");
      window.location.href = "girisyap.html";
    })
    .catch((error) => {
      alert(error.message);
    });
});


// ================= GOOGLE LOGIN =================
document.getElementById("googleBtn").addEventListener("click", () => {
  signInWithPopup(auth, provider)
    .then(() => {
      alert("Google ile giriş başarılı!");
      window.location.href = "index.html";
    })
    .catch((error) => {
      alert(error.message);
    });
});
</script>

</body>
</html>
