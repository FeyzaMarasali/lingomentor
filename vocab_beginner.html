<button onclick="next()" class="bg-green-400 text-white px-4 py-2 rounded-xl">İleri →</button>
</div>

</div>

<script>
const words = [
["apple","elma","I eat an apple."],
["book","kitap","This is a book."],
["car","araba","I have a car."],
["water","su","Drink water."],
["house","ev","My house."],
["school","okul","Go to school."],
["dog","köpek","Cute dog."],
["cat","kedi","Sleeping cat."],
["sun","güneş","Hot sun."],
["moon","ay","Bright moon."],
["food","yemek","Eat food."],
["milk","süt","Drink milk."],
["chair","sandalye","Sit here."],
["table","masa","On table."],
["phone","telefon","My phone."],
["computer","bilgisayar","Use computer."],
["pen","kalem","Write pen."],
["paper","kağıt","White paper."],
["bag","çanta","Heavy bag."],
["shoe","ayakkabı","New shoes."],
["run","koşmak","Run fast."],
["walk","yürümek","Walk slow."],
["eat","yemek","Eat now."],
["sleep","uyumak","Sleep well."],
["happy","mutlu","Be happy."],
["sad","üzgün","Feel sad."],
["big","büyük","Big house."],
["small","küçük","Small dog."],
["hot","sıcak","Hot tea."],
["cold","soğuk","Cold water."],
["friend","arkadaş","Good friend."],
["family","aile","My family."],
["city","şehir","Big city."],
["road","yol","Long road."],
["tree","ağaç","Green tree."],
["flower","çiçek","Nice flower."],
["rain","yağmur","Rain today."],
["snow","kar","White snow."],
["wind","rüzgar","Strong wind."],
["light","ışık","Turn light."],
["dark","karanlık","Dark room."],
["fast","hızlı","Fast car."],
["slow","yavaş","Slow walk."],
["clean","temiz","Clean room."],
["dirty","kirli","Dirty shoes."],
["open","açmak","Open door."],
["close","kapatmak","Close door."],
["good","iyi","Good job."],
["bad","kötü","Bad day."],
["yes","evet","Yes."]
];

let index = 0;
let flipped = false;

const wordEl = document.getElementById("word");
const exampleEl = document.getElementById("example");
const hintEl = document.getElementById("hint");

function updateCard(){
  const w = words[index];

  if(flipped){
    wordEl.innerText = w[1];
    exampleEl.innerText = w[2];
    hintEl.innerText = "Tekrar dokun → kelimeyi gör";
  } else {
    wordEl.innerText = w[0];
    exampleEl.innerText = "";
    hintEl.innerText = "Dokun → anlamı gör";
  }
}

document.getElementById("card").onclick = () => {
  flipped = !flipped;
  updateCard();
};

function next(){
  index = (index + 1) % words.length;
  flipped = false;
  updateCard();
}

function prev(){
  index = (index - 1 + words.length) % words.length;
  flipped = false;
  updateCard();
}

function speak(e){
  e.stopPropagation();
  const utterance = new SpeechSynthesisUtterance(words[index][0]);
  utterance.lang = "en-US";
  speechSynthesis.speak(utterance);
}

updateCard();

// dropdown
const btn = document.getElementById("practiceBtn");
const menu = document.getElementById("practiceMenu");
const arrow = document.getElementById("practiceArrow");

btn.addEventListener("click", () => {
  menu.classList.toggle("hidden");
  arrow.classList.toggle("rotate-180");
});
</script>
